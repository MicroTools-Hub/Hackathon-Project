<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account · WholesaleLedger</title>
  <meta name="description" content="Create your WholesaleLedger account — AI-powered ledgers and payment tracking for wholesale businesses.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="manifest" href="manifest.json">
  <style>
    /* ── Auth Container ─────────────────────────────────────────────────── */
    .auth-container {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background:
        radial-gradient(circle at 10% 20%, rgba(212, 144, 10, 0.06) 0%, transparent 42%),
        radial-gradient(circle at 90% 80%, rgba(74, 127, 165, 0.055) 0%, transparent 42%),
        radial-gradient(circle at 50% 50%, rgba(212, 144, 10, 0.02) 0%, transparent 60%),
        var(--bg);
    }

    /* ── Auth Card ───────────────────────────────────────────────────── */
    .auth-card {
      width: min(100%, 460px);
      padding: clamp(2rem, 4vw, 3rem);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 60%),
        var(--surface);
      box-shadow:
        var(--shadow),
        0 0 0 1px rgba(212, 144, 10, 0.06);
      text-align: center;
      animation: card-enter 0.5s ease both;
    }

    @keyframes card-enter {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ────────────────────────────────────────────────────────── */
    .auth-logo {
      margin-bottom: 2.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
    }

    .logo-icon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(212, 144, 10, 0.75);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(212, 144, 10, 0.3), rgba(74, 127, 165, 0.12)),
        #111412;
      color: var(--ink-strong);
      font-family: var(--heading);
      font-size: 1.85rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      box-shadow: 0 4px 24px rgba(212, 144, 10, 0.15);
      transition: box-shadow 0.3s ease;
    }

    .logo-icon:hover {
      box-shadow: 0 4px 32px rgba(212, 144, 10, 0.25);
    }

    .logo-text {
      font-family: var(--heading);
      font-size: 1.55rem;
      font-weight: 800;
      color: var(--ink-strong);
      margin: 0;
      line-height: 1.15;
    }

    .logo-desc {
      font-size: 0.84rem;
      color: var(--muted);
      margin: 0.2rem 0 0;
      font-family: var(--mono);
      font-size: 0.74rem;
    }

    /* ── Form ────────────────────────────────────────────────────────── */
    .auth-form {
      display: grid;
      gap: 1rem;
      text-align: left;
    }

    .auth-field {
      display: grid;
      gap: 0.42rem;
    }

    .auth-field label {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .auth-field input {
      min-height: 46px;
      width: 100%;
      padding: 0.78rem 0.88rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--ink);
      font-family: var(--body);
      font-size: 0.96rem;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .auth-field input::placeholder {
      color: var(--muted-2);
    }

    .auth-field input:focus {
      border-color: rgba(212, 144, 10, 0.8);
      box-shadow: 0 0 0 3px rgba(212, 144, 10, 0.16);
    }

    /* ── Submit Button ───────────────────────────────────────────────── */
    .auth-submit-btn {
      width: 100%;
      min-height: 48px;
      margin-top: 0.5rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      border: 1px solid rgba(212, 144, 10, 0.58);
      border-radius: var(--radius-sm);
      background: var(--amber);
      color: #14100a;
      font-family: var(--body);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease, box-shadow 200ms ease;
    }

    .auth-submit-btn:hover:not(:disabled) {
      background: #e0a426;
      box-shadow: 0 4px 18px rgba(212, 144, 10, 0.22);
    }

    .auth-submit-btn:active:not(:disabled) {
      transform: translateY(1px);
    }

    .auth-submit-btn:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    /* ── Spinner ─────────────────────────────────────────────────────── */
    .auth-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(20, 16, 10, 0.25);
      border-top-color: #14100a;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    .auth-submit-btn.is-loading .auth-spinner {
      display: inline-block;
    }

    .auth-submit-btn.is-loading .btn-label {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Error Message ───────────────────────────────────────────────── */
    .auth-error {
      display: none;
      padding: 0.72rem 0.88rem;
      border: 1px solid rgba(192, 57, 43, 0.38);
      border-radius: var(--radius-sm);
      background: rgba(192, 57, 43, 0.12);
      color: #ffb9b1;
      font-size: 0.86rem;
      text-align: left;
      line-height: 1.4;
      animation: error-in 0.25s ease;
    }

    .auth-error.is-visible {
      display: block;
    }

    @keyframes error-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Success Message ─────────────────────────────────────────────── */
    .auth-success {
      display: none;
      padding: 0.72rem 0.88rem;
      border: 1px solid rgba(39, 174, 96, 0.38);
      border-radius: var(--radius-sm);
      background: rgba(39, 174, 96, 0.12);
      color: #a6f2c6;
      font-size: 0.86rem;
      text-align: left;
      line-height: 1.4;
      animation: error-in 0.25s ease;
    }

    .auth-success.is-visible {
      display: block;
    }

    /* ── Footer Link ─────────────────────────────────────────────────── */
    .auth-link {
      margin-top: 1.5rem;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .auth-link a {
      color: var(--amber);
      font-weight: 600;
      text-decoration: none;
      transition: color 180ms ease;
    }

    .auth-link a:hover {
      color: #e0a426;
      text-decoration: underline;
    }

    /* ── Password hint ───────────────────────────────────────────────── */
    .field-hint {
      font-size: 0.74rem;
      color: var(--muted-2);
      margin-top: 0.15rem;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <article class="auth-card" style="position: relative; overflow: hidden;">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">WL</div>
        <div>
          <h1 class="logo-text">Create Account</h1>
          <p class="logo-desc">AI-Powered Ledgers &amp; Payment Tracking</p>
        </div>
      </div>

      <!-- Error Area -->
      <div class="auth-error" id="authError"></div>

      <!-- Success Area (email confirmation) -->
      <div class="auth-success" id="authSuccess"></div>

      <!-- Signup Form -->
      <form class="auth-form" id="signupForm" autocomplete="on">
        <div class="auth-field">
          <label for="businessNameInput">Business Name</label>
          <input
            class="field-control"
            id="businessNameInput"
            type="text"
            placeholder="Sharma Textiles Pvt. Ltd."
            autocomplete="organization"
            required
          >
        </div>

        <div class="auth-field">
          <label for="emailInput">Email Address</label>
          <input
            class="field-control"
            id="emailInput"
            type="email"
            placeholder="name@business.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="auth-field">
          <label for="passwordInput">Password</label>
          <input
            class="field-control"
            id="passwordInput"
            type="password"
            placeholder="Create a strong password"
            autocomplete="new-password"
            required
            minlength="6"
          >
          <span class="field-hint">Minimum 6 characters</span>
        </div>

        <div class="auth-field">
          <label for="confirmPasswordInput">Confirm Password</label>
          <input
            class="field-control"
            id="confirmPasswordInput"
            type="password"
            placeholder="Repeat your password"
            autocomplete="new-password"
            required
            minlength="6"
          >
        </div>

        <button class="auth-submit-btn" type="submit" id="submitBtn">
          <span class="btn-label">Create Account</span>
          <span class="auth-spinner"></span>
        </button>
      </form>

      <!-- Footer -->
      <p class="auth-link">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </article>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/vendor/idb.umd.js"></script>
  <script src="js/vendor-idb.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/db.js"></script>
  <script src="js/notify.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      // ── Already authenticated? Redirect. ────────────────────────────
      try {
        const authed = await WLAuth.isAuthenticated();
        if (authed) {
          window.location.href = "index.html";
          return;
        }
      } catch (e) {
        console.warn("[Signup] Auth check failed:", e);
      }

      // ── Elements ────────────────────────────────────────────────────
      const form       = document.getElementById("signupForm");
      const bizNameEl  = document.getElementById("businessNameInput");
      const emailEl    = document.getElementById("emailInput");
      const passEl     = document.getElementById("passwordInput");
      const confirmEl  = document.getElementById("confirmPasswordInput");
      const btn        = document.getElementById("submitBtn");
      const errorEl    = document.getElementById("authError");
      const successEl  = document.getElementById("authSuccess");

      function showError(msg) {
        successEl.classList.remove("is-visible");
        errorEl.textContent = msg;
        errorEl.classList.add("is-visible");
      }

      function showSuccess(msg) {
        errorEl.classList.remove("is-visible");
        successEl.textContent = msg;
        successEl.classList.add("is-visible");
      }

      function hideMessages() {
        errorEl.classList.remove("is-visible");
        successEl.classList.remove("is-visible");
      }

      function setLoading(loading) {
        btn.disabled = loading;
        btn.classList.toggle("is-loading", loading);
      }

      /**
       * Generate a prefix from the business name:
       * Take the first 3 alphabetic characters, uppercase.
       * Falls back to "BIZ" if the name doesn't have enough letters.
       */
      function generatePrefix(name) {
        const letters = name.replace(/[^a-zA-Z]/g, "");
        if (letters.length >= 3) return letters.substring(0, 3).toUpperCase();
        if (letters.length > 0) return letters.toUpperCase().padEnd(3, "X");
        return "BIZ";
      }

      // ── Form submit ────────────────────────────────────────────────
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideMessages();

        const businessName = bizNameEl.value.trim();
        const email        = emailEl.value.trim();
        const password     = passEl.value;
        const confirm      = confirmEl.value;

        // ── Client-side validation ──────────────────────────────────
        if (!businessName) {
          showError("Please enter your business name.");
          bizNameEl.focus();
          return;
        }

        if (!email) {
          showError("Please enter your email address.");
          emailEl.focus();
          return;
        }

        if (password.length < 6) {
          showError("Password must be at least 6 characters long.");
          passEl.focus();
          return;
        }

        if (password !== confirm) {
          showError("Passwords do not match. Please re-enter.");
          confirmEl.focus();
          return;
        }

        setLoading(true);

        try {
          // ── 1. Create Supabase user ─────────────────────────────
          const { data, error } = await WLAuth.signUp(email, password);

          if (error) {
            showError(error.message || "Sign-up failed. Please try again.");
            setLoading(false);
            return;
          }

          const user = data.user;

          // If email confirmation is required, Supabase returns user but no session
          if (!data.session) {
            showSuccess(
              "Account created! Please check your email for a verification link, then come back and log in."
            );
            setLoading(false);
            // Disable form so they don't re-submit
            form.querySelectorAll("input, button").forEach((el) => (el.disabled = true));
            return;
          }

          // ── 2. Insert business into Supabase `businesses` table ─
          const prefix = generatePrefix(businessName);
          const sbClient = WLAuth.getClient();

          try {
            await sbClient.from("businesses").insert({
              name: businessName,
              user_id: user.id,
              prefix: prefix,
            });
          } catch (sbErr) {
            console.warn("[Signup] Supabase businesses insert warning:", sbErr);
            // Non-fatal: continue with local setup even if remote insert fails
          }

          // ── 3. Create local business in IndexedDB ───────────────
          try {
            await window.WLDB.init();
            await window.WLDB.createBusiness({
              name: businessName,
              prefix: prefix,
            });
          } catch (dbErr) {
            console.warn("[Signup] Local DB setup warning:", dbErr);
          }

          // ── 4. Store user for backward compat ───────────────────
          localStorage.setItem("wl_user", JSON.stringify({
            id: user.id,
            email: user.email,
            name: user.user_metadata?.full_name || email.split("@")[0],
            picture: user.user_metadata?.avatar_url || "",
            logged_at: Date.now(),
          }));

          // ── 5. Redirect ─────────────────────────────────────────
          window.location.href = "index.html";

        } catch (err) {
          console.error("[Signup] Unexpected error:", err);
          showError("An unexpected error occurred. Please try again.");
          setLoading(false);
        }
      });
    });
  </script>
</body>
</html>
