<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0D0F0E">
  <title>Settings - WholesaleLedger</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/settings.css">
</head>
<body>
  <div class="offline-banner">Offline mode active. Settings changes are stored locally.</div>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-row">
        <a class="brand" href="index.html">
          <span class="brand-mark">WL</span>
          <span class="brand-copy">
            <span class="brand-title" data-business-name>WholesaleLedger</span>
            <span class="brand-subtitle" data-business-prefix>Device ledger</span>
          </span>
        </a>
      </div>
      <nav class="desktop-nav" aria-label="Primary navigation">
        <a href="index.html" data-nav="dashboard">Dashboard</a>
        <a href="clients.html" data-nav="clients">Clients</a>
        <a href="#" data-open-export>Export</a>
        <a href="settings.html" data-nav="settings">Settings</a>
      </nav>
      <div class="top-actions">
        <select class="business-select" data-business-select aria-label="Active business"></select>
        <span class="status-pill is-offline" data-connection-status>
          <span class="status-dot"></span>
          <span data-connection-label>Offline</span>
        </span>
        <button class="icon-btn hide-on-compact" type="button" data-notification-bell aria-label="Notifications">
          <span aria-hidden="true">!</span>
          <span class="notification-count" data-notification-count hidden>0</span>
        </button>
      </div>
    </header>

    <main class="page-main settings-page">
      <section class="panel">
        <div class="section-head">
          <div>
            <p class="section-kicker">Configuration</p>
            <h1 class="section-title">Settings</h1>
          </div>
        </div>
      </section>

      <div class="settings-grid">
        <div class="settings-section">
          <div class="settings-section-head">
            <h2>Business Setup</h2>
            <button class="btn btn-primary" type="button" data-save-business>Save</button>
          </div>
          <form class="form-grid" data-business-form>
            <div class="field">
              <label for="businessName">Business name</label>
              <input class="field-control" id="businessName" name="business_name" required>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="businessPrefix">Prefix keyword</label>
                <input class="field-control" id="businessPrefix" name="business_prefix" maxlength="8" required>
              </div>
              <div class="field">
                <label for="currencySymbol">Currency symbol</label>
                <input class="field-control" id="currencySymbol" name="currency_symbol" maxlength="4" required>
              </div>
            </div>
            <div class="field">
              <label for="themeMode">Theme</label>
              <select class="field-control" id="themeMode" name="theme">
                <option value="dark">Dark</option>
                <option value="light">Light</option>
              </select>
            </div>
          </form>
        </div>

        <div class="settings-section">
          <div class="settings-section-head">
            <h2>Backend Connection</h2>
            <button class="btn btn-blue" type="button" data-test-endpoint>Test Connection</button>
          </div>
          <div class="form-grid">
            <div class="field">
              <label for="sseEndpoint">SSE endpoint URL</label>
              <input class="field-control" id="sseEndpoint" name="sse_endpoint" type="url" placeholder="https://ecological-discs-dominant-dvd.trycloudflare.com/sse">
            </div>
            <button class="btn btn-primary" type="button" data-save-endpoint>Save Endpoint</button>
          </div>
          <div class="connection-log" data-connection-log></div>
        </div>

        <div class="settings-section">
          <div class="settings-section-head">
            <h2>Trusted Numbers</h2>
          </div>
          <form class="form-grid" data-number-form>
            <div class="field-row">
              <div class="field">
                <label for="trustedPhone">WhatsApp number</label>
                <input class="field-control" id="trustedPhone" name="phone" type="tel" placeholder="+919876500003" required>
              </div>
              <div class="field">
                <label for="trustedLabel">Label</label>
                <select class="field-control" id="trustedLabel" name="label">
                  <option>Owner</option>
                  <option>Manager</option>
                  <option>Accountant</option>
                  <option>Staff</option>
                </select>
              </div>
            </div>
            <button class="btn btn-primary" type="button" data-add-number>Add Number</button>
          </form>
          <div class="trusted-list" data-trusted-list></div>
        </div>

        <div class="settings-section">
          <div class="settings-section-head">
            <h2>Export</h2>
          </div>
          <div class="export-actions">
            <button class="btn btn-blue" type="button" data-open-export>Export Excel</button>
            <button class="btn btn-green" type="button" data-export-json>Export JSON Backup</button>
            <button class="btn" type="button" data-import-json>Import JSON Backup</button>
            <input type="file" accept="application/json" data-import-json-file hidden>
            <button class="btn btn-danger" type="button" data-clear-data>Clear All Data</button>
          </div>
        </div>

        <div class="settings-section danger-zone">
          <div class="settings-section-head">
            <h2>Danger Zone</h2>
          </div>
          <div class="danger-actions">
            <button class="btn btn-danger" type="button" data-reset-payments>Reset Payment Records</button>
            <button class="btn btn-danger" type="button" data-delete-business>Delete Business</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="confirmModal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <h2 class="modal-title" data-confirm-title>Confirm</h2>
        <button class="icon-btn" type="button" data-close-modal aria-label="Close confirmation modal">&times;</button>
      </div>
      <div class="modal-body form-grid">
        <p class="muted" data-confirm-body></p>
        <div class="field">
          <label>Type <span class="mono" data-confirm-name></span> to confirm</label>
          <input class="field-control" name="confirm_text">
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" type="button" data-close-modal>Cancel</button>
        <button class="btn btn-danger" type="button" data-run-confirm>Confirm</button>
      </div>
    </div>
  </div>

  <nav class="mobile-nav" aria-label="Mobile navigation">
    <a href="index.html" data-nav="dashboard"><span class="nav-icon" aria-hidden="true">#</span><span>Dashboard</span></a>
    <a href="clients.html" data-nav="clients"><span class="nav-icon" aria-hidden="true">@</span><span>Clients</span></a>
    <button type="button" data-open-export><span class="nav-icon" aria-hidden="true">$</span><span>Export</span></button>
    <a href="settings.html" data-nav="settings"><span class="nav-icon" aria-hidden="true">...</span><span>Settings</span></a>
  </nav>

  <script src="js/vendor/idb.umd.js"></script>
  <script src="js/vendor-idb.js"></script>
  <script src="js/vendor/xlsx.full.min.js"></script>
  <script src="js/vendor/jspdf.umd.min.js"></script>
  <script src="js/vendor/jspdf.plugin.autotable.min.js"></script>
  <script src="js/db.js"></script>
  <script src="js/notify.js"></script>
  <script src="js/export.js"></script>
  <script src="js/sse.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
