<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · WholesaleLedger</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/settings.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .auth-container {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background:
        radial-gradient(circle at 10% 20%, rgba(212, 144, 10, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(74, 127, 165, 0.06) 0%, transparent 40%),
        var(--bg);
    }
    .auth-card {
      width: min(100%, 460px);
      padding: clamp(2rem, 4vw, 3rem);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent), var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .auth-logo {
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .logo-icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(212, 144, 10, 0.75);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(212, 144, 10, 0.3), rgba(74, 127, 165, 0.12)), #111412;
      color: var(--ink-strong);
      font-family: var(--heading);
      font-size: 1.8rem;
      font-weight: 800;
    }
    .logo-text {
      font-family: var(--heading);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--ink-strong);
      margin: 0;
    }
    .logo-desc {
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }
    .sso-button {
      width: 100%;
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--ink-strong);
      font-weight: 700;
      transition: background 160ms ease, transform 160ms ease;
      margin-bottom: 1.5rem;
    }
    .sso-button:hover {
      background: var(--surface-3);
    }
    .sso-button:active {
      transform: translateY(1px);
    }
    .google-icon {
      width: 18px;
      height: 18px;
    }
    .divider {
      position: relative;
      margin: 1.5rem 0;
      text-align: center;
    }
    .divider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--line);
      z-index: 1;
    }
    .divider-text {
      position: relative;
      z-index: 2;
      padding: 0 0.75rem;
      background: var(--surface);
      color: var(--muted-2);
      font-size: 0.76rem;
      text-transform: uppercase;
      font-family: var(--mono);
    }
    .auth-submit-btn {
      width: 100%;
      min-height: 44px;
      margin-top: 0.5rem;
    }

    /* Google Account Selector Modal */
    .google-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      display: none;
      place-items: center;
      padding: 1rem;
    }
    .google-modal-overlay.active {
      display: grid;
    }
    .google-sso-card {
      width: min(100%, 440px);
      background: #ffffff;
      color: #202124;
      border-radius: 8px;
      padding: 2.25rem 1.75rem;
      box-shadow: 0 12px 36px rgba(0,0,0,0.4);
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .google-logo {
      height: 24px;
      margin: 0 auto 1rem;
    }
    .google-sso-card h2 {
      font-size: 1.35rem;
      font-weight: 400;
      color: #202124;
      margin: 0.5rem 0 0.25rem;
    }
    .google-sso-card .subtitle {
      font-size: 0.9rem;
      color: #5f6368;
      margin-bottom: 1.5rem;
    }
    .google-account-list {
      display: flex;
      flex-direction: column;
      text-align: left;
      margin-bottom: 1.5rem;
    }
    .google-account-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #dadce0;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .google-account-item:hover {
      background: #f8f9fa;
    }
    .google-account-item:first-child {
      border-top: 1px solid #dadce0;
    }
    .google-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #1a73e8;
      color: #ffffff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
    }
    .google-info {
      display: flex;
      flex-direction: column;
    }
    .google-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: #3c4043;
    }
    .google-email {
      font-size: 0.78rem;
      color: #5f6368;
    }
    
    /* Custom input form inside Google modal */
    .google-custom-form {
      display: none;
      text-align: left;
    }
    .google-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }
    .google-field label {
      font-size: 0.82rem;
      font-weight: 500;
      color: #5f6368;
    }
    .google-control {
      padding: 0.7rem 0.8rem;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 0.95rem;
      outline: none;
      color: #202124;
      background: #ffffff;
      transition: border-color 150ms ease;
      width: 100%;
      box-sizing: border-box;
    }
    .google-control:focus {
      border-color: #1a73e8;
    }
    .google-btn-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
    }
    .google-btn {
      padding: 0.55rem 1.2rem;
      border: 0;
      border-radius: 4px;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.88rem;
    }
    .google-btn-link {
      background: transparent;
      color: #1a73e8;
    }
    .google-btn-primary {
      background: #1a73e8;
      color: #ffffff;
    }
    .google-btn-primary:hover {
      background: #1557b0;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <article class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">WL</div>
        <div>
          <h1 class="logo-text">WholesaleLedger</h1>
          <p class="logo-desc">AI-Powered Ledgers & Payment Tracking</p>
        </div>
      </div>

      <button class="sso-button" type="button" id="googleSsoBtn" onclick="openGoogleSsoModal()">
        <svg class="google-icon" viewBox="0 0 24 24" width="100%" height="100%">
          <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114-3.555 0-6.437-2.882-6.437-6.437 0-3.555 2.882-6.437 6.437-6.437 1.488 0 2.858.508 3.947 1.353l3.074-3.074C19.123 2.127 15.9 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c5.898 0 10.74-4.257 11.24-10.155H12.24z"/>
        </svg>
        Sign in with Google
      </button>

      <div class="divider">
        <span class="divider-text">or use email</span>
      </div>

      <form class="form-grid" id="loginForm">
        <div class="field" style="text-align: left;">
          <label for="emailInput">Email Address</label>
          <input class="field-control" id="emailInput" type="email" placeholder="name@business.com" required>
        </div>
        <button class="btn btn-primary auth-submit-btn" type="submit">Sign In</button>
      </form>
    </article>
  </div>

  <!-- Google SSO account selector modal -->
  <div id="googleSsoModal" class="google-modal-overlay">
    <div class="google-sso-card">
      <svg class="google-logo" viewBox="0 0 74 24" fill="none" style="display:block; margin:0 auto;">
        <path d="M9.2 18.5c-4.4 0-8-3.5-8-8s3.6-8 8-8c2.4 0 4.1.9 5.5 2.2L13 6.4c-1-1-2.3-1.6-3.8-1.6-3 0-5.5 2.5-5.5 5.7s2.5 5.7 5.5 5.7c2 0 3-.8 3.8-1.6.6-.6 1-1.5 1.1-2.7H9.2v-3.4h11.2c.1.6.1 1.2.1 1.9 0 2.2-.6 4.9-2.5 6.8-1.9 2-4.3 3.2-8.8 3.2z" fill="#4285F4"/>
        <path d="M28.3 18.5c-2.4 0-4.3-1.8-4.3-4.5s1.9-4.5 4.3-4.5S32.6 11.3 32.6 14s-1.9 4.5-4.3 4.5zm0-2.8c1.3 0 2.3-1.1 2.3-2.6s-1-2.6-2.3-2.6-2.3 1.1-2.3 2.6 1 2.6 2.3 2.6z" fill="#EA4335"/>
        <path d="M38.2 18.5c-2.4 0-4.3-1.8-4.3-4.5s1.9-4.5 4.3-4.5 4.3 1.8 4.3 4.5-1.9 4.5-4.3 4.5zm0-2.8c1.3 0 2.3-1.1 2.3-2.6s-1-2.6-2.3-2.6-2.3 1.1-2.3 2.6 1 2.6 2.3 2.6z" fill="#FBBC05"/>
        <path d="M48 18.5c-2.4 0-4.3-1.8-4.3-4.5s1.9-4.5 4.3-4.5c2.2 0 4 1.7 4 4.3v.6H46.1c.1 1 1 1.8 2.1 1.8.9 0 1.5-.4 1.9-1l3 1.5c-.7 1.2-2.2 2.8-5.1 2.8zm-.1-6.4c-1 0-1.7.7-1.9 1.5H50c-.1-.8-.8-1.5-1.7-1.5z" fill="#4285F4"/>
        <path d="M55.7 2.2h3.4v15.9h-3.4z" fill="#34A853"/>
        <path d="M66.4 18.5c-2.4 0-4.3-1.8-4.3-4.5s1.9-4.5 4.3-4.5 3.9 1.8 3.9 4.3v.6H64.6c.1 1 1 1.8 2.1 1.8.9 0 1.5-.4 1.9-1l3 1.5c-.8 1.2-2.3 2.8-5.2 2.8zm-.2-6.4c-1 0-1.7.7-1.9 1.5h3.9c-.1-.8-.8-1.5-1.8-1.5z" fill="#EA4335"/>
      </svg>

      <!-- Account Selection Panel -->
      <div id="googleAccountSelection">
        <h2>Choose an account</h2>
        <p class="subtitle">to continue to WholesaleLedger</p>
        
        <div class="google-account-list">
          <div class="google-account-item" onclick="selectGoogleAccount('huzeifa@gmail.com', 'Huzeifa Malkapurwala', '#db4437')">
            <div class="google-avatar" style="background:#db4437;">H</div>
            <div class="google-info">
              <span class="google-name">Huzeifa Malkapurwala</span>
              <span class="google-email">huzeifa@gmail.com</span>
            </div>
          </div>
          <div class="google-account-item" onclick="selectGoogleAccount('amit.traders@gmail.com', 'Amit Traders', '#0f9d58')">
            <div class="google-avatar" style="background:#0f9d58;">A</div>
            <div class="google-info">
              <span class="google-name">Amit Traders</span>
              <span class="google-email">amit.traders@gmail.com</span>
            </div>
          </div>
          <div class="google-account-item" onclick="showGoogleCustomForm()">
            <div class="google-avatar" style="background:#757575;">+</div>
            <div class="google-info">
              <span class="google-name">Use another account</span>
              <span class="google-email">Sign in with any Gmail address</span>
            </div>
          </div>
        </div>
        <button class="google-btn google-btn-link" onclick="closeGoogleSsoModal()" style="margin-top: 0.5rem;">Cancel</button>
      </div>

      <!-- Use another account (Custom Gmail) Panel -->
      <div id="googleCustomForm" class="google-custom-form">
        <h2>Sign in</h2>
        <p class="subtitle">with your Google Account</p>
        <form onsubmit="submitGoogleCustom(event)">
          <div class="google-field">
            <label for="ssoEmailInput">Email address</label>
            <input class="google-control" id="ssoEmailInput" type="email" placeholder="name@gmail.com" required>
          </div>
          <div class="google-field">
            <label for="ssoNameInput">Name (optional)</label>
            <input class="google-control" id="ssoNameInput" type="text" placeholder="Your Name">
          </div>
          <div class="google-btn-row">
            <button class="google-btn google-btn-link" type="button" onclick="showGoogleAccountList()">Back</button>
            <button class="google-btn google-btn-primary" type="submit">Next</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/notify.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      checkAlreadyLoggedIn();

      const form = document.getElementById("loginForm");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("emailInput").value.trim();
        await handleLogin(email, email.split("@")[0]);
      });
    });

    async function checkAlreadyLoggedIn() {
      const user = localStorage.getItem("wl_user");
      if (user) {
        await window.WLDB.init();
        const active = await window.WLDB.getActiveBusiness();
        if (active) {
          window.location.href = "index.html";
        } else {
          window.location.href = "onboarding.html";
        }
      }
    }

    async function handleLogin(email, name, avatarColor = "#d4900a") {
      // Create a nice default avatar using the first letter of name
      const letter = (name || email).charAt(0).toUpperCase();
      localStorage.setItem("wl_user", JSON.stringify({
        email,
        name: name || email.split("@")[0],
        picture: "",
        avatar_color: avatarColor,
        logged_at: Date.now()
      }));
      window.WLNotify.success("Welcome!", email);
      
      await window.WLDB.init();
      const active = await window.WLDB.getActiveBusiness();
      if (active) {
        window.location.href = "index.html";
      } else {
        window.location.href = "onboarding.html";
      }
    }

    // Modal control functions
    function openGoogleSsoModal() {
      document.getElementById("googleSsoModal").classList.add("active");
      showGoogleAccountList();
    }

    function closeGoogleSsoModal() {
      document.getElementById("googleSsoModal").classList.remove("active");
    }

    function showGoogleCustomForm() {
      document.getElementById("googleAccountSelection").style.display = "none";
      document.getElementById("googleCustomForm").style.display = "block";
    }

    function showGoogleAccountList() {
      document.getElementById("googleAccountSelection").style.display = "block";
      document.getElementById("googleCustomForm").style.display = "none";
    }

    async function selectGoogleAccount(email, name, avatarColor) {
      closeGoogleSsoModal();
      await handleLogin(email, name, avatarColor);
    }

    async function submitGoogleCustom(event) {
      event.preventDefault();
      const email = document.getElementById("ssoEmailInput").value.trim();
      const name = document.getElementById("ssoNameInput").value.trim() || email.split("@")[0];
      closeGoogleSsoModal();
      
      // Select a random nice color for custom user
      const colors = ["#4285F4", "#db4437", "#f4b400", "#0f9d58", "#ab47bc", "#00acc1"];
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      
      await handleLogin(email, name, randomColor);
    }
  </script>
</body>
</html>
