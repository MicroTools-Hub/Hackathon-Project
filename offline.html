<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0D0F0E">
  <title>Offline - WholesaleLedger</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    .offline-main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .offline-card {
      width: min(520px, 100%);
      display: grid;
      gap: 1rem;
      padding: 1.25rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .offline-card h1 {
      margin: 0;
      color: var(--ink-strong);
      font-family: var(--heading);
      font-size: 1.8rem;
    }

    .offline-card p {
      margin: 0;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="offline-main">
    <section class="offline-card">
      <span class="brand-mark">WL</span>
      <h1>WholesaleLedger is offline</h1>
      <p>The last cached dashboard, client pages, and local IndexedDB records remain available. Reopen the app from the dashboard once the connection returns.</p>
      <a class="btn btn-primary" href="index.html">Open Dashboard</a>
    </section>
  </main>
</body>
</html>
